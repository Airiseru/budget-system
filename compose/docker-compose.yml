services:
  # Service 1: The Database
  db:
    image: postgres:15-alpine
    container_name: budget_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: budget_system_db
    ports:
      - "5432:5432" # Allows you to see the DB from your PC
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Service 2: The Web App (Next.js)
  web:
    build: 
      context: ..
      dockerfile: compose/Dockerfile
    container_name: budget_web
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    depends_on:
      - db

volumes:
  postgres_data: